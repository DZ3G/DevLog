{% extends "base.html" %}
{% block content %}
    <h2>{{ post.title }}</h2>
    <p style="color: #aaa; font-size: 0.85rem; margin: 0.5rem 0 1.5rem;">{{ post.date.strftime('%d/%m/%Y') }}</p>
    <p style="line-height: 1.8;">{{ post.content }}</p>

    {% if current_user.is_authenticated and current_user.id == post.user_id %}
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <a href="/post/{{ post.id }}/edit" class="btn">Modifier</a>
            <form method="POST" action="/post/{{ post.id }}/delete">
                <button type="submit" class="btn" style="background: #e05252;">Supprimer</button>
            </form>
        </div>
    {% endif %}
{% endblock %}
